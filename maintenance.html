<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Site en maintenance — BATIMOD</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: #1a1d23;
      color: #e8eaed;
      padding: 1.5rem;
      line-height: 1.5;
    }
    main {
      max-width: 32rem;
      text-align: center;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
      letter-spacing: 0.02em;
    }
    p {
      margin: 0;
      color: #b4bac4;
      font-size: 0.95rem;
    }
    .brand {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8b949e;
      margin-bottom: 1.25rem;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">BATIMOD</div>
    <h1>Site en maintenance</h1>
    <p>Nous effectuons une mise à jour. Merci de revenir un peu plus tard.</p>
  </main>
</body>
</html>
